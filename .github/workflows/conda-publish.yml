# .github/workflows/conda-build-publish.yml

name: Conda-Build, Test, and Publish Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (leave empty for latest from PyPI)'
        required: false
        type: string
  release:
    types: [published]

jobs:
  build-publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Tüm tag'leri çek (sürüm bilgisi için)

      # ================================================================
      # ADIM 1: PyPI'den Son Sürüm Bilgilerini Çek
      # ================================================================
      - name: Fetch latest version info from PyPI
        id: pypi_info
        run: |
          # Kullanıcı manuel sürüm girdiyse onu kullan, yoksa PyPI'den çek
          if [ -n "${{ inputs.version }}" ]; then
            PKG_VERSION="${{ inputs.version }}"
            echo "📌 Manuel sürüm kullanılıyor: $PKG_VERSION"
          else
            # PyPI JSON API'den son sürümü çek
            echo "🔍 PyPI'den son sürüm bilgisi çekiliyor..."
            PYPI_JSON=$(curl -s https://pypi.org/pypi/kha256/json)
            
            PKG_VERSION=$(echo "$PYPI_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          print(data['info']['version'])
          ")
            echo "✅ PyPI'den çekilen sürüm: $PKG_VERSION"
          fi
          
          echo "PKG_VERSION=$PKG_VERSION" >> $GITHUB_ENV
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT

      # ================================================================
      # ADIM 2: PyPI'den Source URL ve BLAKE2b-256 Hash Çek
      # ================================================================
      - name: Fetch PyPI source URL and BLAKE2b-256 hash
        id: pypi_source
        run: |
          echo "📦 PyPI source bilgileri çekiliyor (sürüm: $PKG_VERSION)..."
          
          PYPI_JSON=$(curl -s "https://pypi.org/pypi/kha256/$PKG_VERSION/json")
          
          # Source distribution (sdist) URL'sini ve hash'ini çek
          SOURCE_INFO=$(echo "$PYPI_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          
          # sdist (tar.gz) dosyasını bul
          for url_info in data['urls']:
              if url_info['packagetype'] == 'sdist':
                  print(f\"URL={url_info['url']}\")
                  print(f\"HASH={url_info['digests']['blake2b_256']}\")
                  break
          else:
              # sdist yoksa whl dosyasını kullan
              for url_info in data['urls']:
                  if url_info['packagetype'] == 'bdist_wheel':
                      print(f\"URL={url_info['url']}\")
                      print(f\"HASH={url_info['digests']['blake2b_256']}\")
                      break
          ")
          
          # Ortam değişkenlerini ayarla
          PYPI_URL=$(echo "$SOURCE_INFO" | grep "^URL=" | cut -d'=' -f2-)
          PYPI_HASH=$(echo "$SOURCE_INFO" | grep "^HASH=" | cut -d'=' -f2-)
          
          if [ -z "$PYPI_URL" ] || [ -z "$PYPI_HASH" ]; then
            echo "❌ HATA: PyPI'den source bilgileri çekilemedi!"
            echo "PyPI JSON çıktısı:"
            echo "$PYPI_JSON" | head -50
            exit 1
          fi
          
          echo "✅ Source URL: $PYPI_URL"
          echo "✅ BLAKE2b-256: $PYPI_HASH"
          
          echo "PYPI_URL=$PYPI_URL" >> $GITHUB_ENV
          echo "PYPI_HASH=$PYPI_HASH" >> $GITHUB_ENV
          echo "url=$PYPI_URL" >> $GITHUB_OUTPUT
          echo "hash=$PYPI_HASH" >> $GITHUB_OUTPUT

      # ================================================================
      # ADIM 3: Miniconda Kurulumu
      # ================================================================
      - name: Setup Miniconda for Python ${{ matrix.python-version }}
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          python-version: "${{ matrix.python-version }}"
          channels: conda-forge,bilgi,defaults
          channel-priority: strict
          miniforge-version: latest

      - name: Install Conda-Build and Conda-Verify
        run: |
          conda config --add channels bilgi
          conda config --set channel_priority strict
          conda install -n base -y conda-build conda-verify anaconda-client
          conda info

      # ================================================================
      # ADIM 4: Conda Paketi Oluştur (--no-test ile testleri atla)
      # ================================================================
      - name: Build the package (skip tests)
        run: |
          echo "=========================================="
          echo "🔨 Conda Paketi Oluşturuluyor"
          echo "=========================================="
          echo "Sürüm: $PKG_VERSION"
          echo "Python: ${{ matrix.python-version }}"
          echo "Source URL: $PYPI_URL"
          echo "BLAKE2b-256: $PYPI_HASH"
          echo "=========================================="
          
          # --no-test: Testleri atla (test adımı ayrı yapılacak)
          conda build . \
            --python ${{ matrix.python-version }} \
            --no-test \
            --output-folder ./dist
          
          # Oluşturulan paketi kontrol et
          if [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "❌ HATA: Hiçbir conda paketi oluşturulamadı!"
            exit 1
          fi
          
          echo ""
          echo "✅ Oluşturulan paketler:"
          find dist -name "*.conda" -o -name "*.tar.bz2" | sort

      # ================================================================
      # ADIM 5: Test Ortamı Oluştur
      # ================================================================
      - name: Create test environment
        run: |
          echo "🧪 Test ortamı oluşturuluyor..."
          
          conda create -n test-env -y \
            python=${{ matrix.python-version }} \
            numpy pytest pytest-cov \
            -c conda-forge -c bilgi
          
          # kececinumbers bağımlılığını yükle
          conda install -n test-env -y kececinumbers -c bilgi
          
          echo ""
          echo "✅ Test ortamı paketleri:"
          conda list -n test-env | grep -E "(python|numpy|kececinumbers|pytest)" || true

      # ================================================================
      # ADIM 6: Geliştirme Testlerini Çalıştır (opsiyonel)
      # ================================================================
      - name: Run development tests (optional)
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
        continue-on-error: true  # Testler başarısız olsa da devam et
        run: |
          echo "🧪 Geliştirme testleri çalıştırılıyor..."
          
          # Kaynak kodu kopyala (eğer tests/ dizini varsa)
          if [ -d "tests" ]; then
            conda run -n test-env pytest tests/ \
              --cov=kha256 \
              --cov-report=term-missing \
              -v || echo "⚠️ Testler başarısız oldu ama devam ediliyor"
          else
            echo "ℹ️ tests/ dizini bulunamadı, geliştirme testleri atlandı"
          fi

      # ================================================================
      # ADIM 7: Oluşturulan Paketi Kur ve Test Et
      # ================================================================
      - name: Install and verify the built package
        run: |
          echo "📦 Oluşturulan paket kuruluyor ve test ediliyor..."
          
          # .conda veya .tar.bz2 dosyasını bul
          PACKAGE_FILE=$(find dist -name "*.conda" -o -name "*.tar.bz2" | head -n 1)
          
          if [ -z "$PACKAGE_FILE" ]; then
            echo "❌ HATA: Kurulacak paket dosyası bulunamadı!"
            exit 1
          fi
          
          echo "✅ Kurulan paket: $PACKAGE_FILE"
          
          # Paketi test ortamına kur
          conda install -n test-env -y "$PACKAGE_FILE"
          
          # Paket doğrulama testi
          conda run -n test-env python -c "
          import kha256
          import kececinumbers
          
          print('✅ Paket ve bağımlılıklar başarıyla yüklendi!')
          print(f'📦 KHA-256 version: {kha256.__version__}')
          print(f'📦 KececiNumbers version: {kececinumbers.__version__}')
          
          # Basit fonksiyon testi
          try:
              result = kha256.quick_hash('test')
              print(f'✅ quick_hash testi başarılı: {result[:16]}...')
          except Exception as e:
              print(f'⚠️ quick_hash testi başarısız: {e}')
          "

      # ================================================================
      # ADIM 8: Hata Ayıklama (başarısızlık durumunda)
      # ================================================================
      - name: Debug - Environment info
        if: failure()
        run: |
          echo "=========================================="
          echo "🔍 Hata Ayıklama Bilgileri"
          echo "=========================================="
          conda info
          echo ""
          echo "Test ortamı paketleri:"
          conda list -n test-env
          echo ""
          echo "Ortam detayları:"
          conda env export -n test-env

      # ================================================================
      # ADIM 9: Anaconda Cloud'a Yükle
      # ================================================================
      - name: Upload to Anaconda Cloud
        if: success()
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          echo "📤 Anaconda Cloud'a yükleniyor..."
          
          PACKAGE_FILES=$(find dist -name "*.conda" -o -name "*.tar.bz2")
          
          if [ -z "$PACKAGE_FILES" ]; then
            echo "❌ HATA: Yüklenecek paket dosyası yok!"
            exit 1
          fi
          
          echo "✅ Yüklenecek paketler:"
          echo "$PACKAGE_FILES"
          
          # anaconda-client zaten kurulu (Adım 3'te)
          for pkg in $PACKAGE_FILES; do
            echo ""
            echo "📦 Yükleniyor: $pkg"
            anaconda -t $ANACONDA_TOKEN upload \
              "$pkg" \
              --user bilgi \
              --label main \
              --skip-existing \
              --force || {
                echo "⚠️ Yükleme başarısız: $pkg"
                continue
              }
          done
          
          echo ""
          echo "✅ Tüm paketler başarıyla yüklendi!"

      # ================================================================
      # ADIM 10: Temizlik
      # ================================================================
      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Temizlik yapılıyor..."
          conda env remove -n test-env || true
          rm -rf dist/ build/ || true
          echo "✅ Temizlik tamamlandı"

      # ================================================================
      # ADIM 11: Özet (Başarı Durumu)
      # ================================================================
      - name: Summary
        if: success()
        run: |
          echo "=========================================="
          echo "✅ CONDA BUILD VE YAYINLAMA BAŞARILI"
          echo "=========================================="
          echo "📦 Paket: kha256"
          echo "🏷️  Sürüm: $PKG_VERSION"
          echo "🐍 Python: ${{ matrix.python-version }}"
          echo "🔗 PyPI URL: $PYPI_URL"
          echo "🔒 BLAKE2b-256: $PYPI_HASH"
          echo "📤 Anaconda: https://anaconda.org/bilgi/kha256"
          echo "=========================================="
