# meta.yaml
package:
  name: kha256
  version: "0.0.0"  # Workflow tarafından güncellenecek

source:
  url: ""  # Workflow tarafından güncellenecek
  blake2b-256: ""  # Workflow tarafından güncellenecek

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools
  run:
    - python >=3.11
    - numpy
    - kececinumbers

test:
  imports:
    - kha256
  commands:
    - python -c "import kha256; print(kha256.__version__)"

about:
  home: https://github.com/WhiteSymmetry/kha256
  license: AGPL-3.0-or-later
  summary: "KHA-256: Next-Generation Cryptographic Hash Algorithm"
  description: |
    KHA-256 (Keçeci Hash Algorithm-256) is a novel cryptographic hash function 
    that leverages mathematical constants and Keçeci Numbers.
  dev_url: https://github.com/WhiteSymmetry/kha256
  doc_url: https://kha256.readthedocs.io

extra:
  recipe-maintainers:
    - WhiteSymmetry
